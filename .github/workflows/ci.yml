name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run clippy (default features)
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Run clippy (no default features)
        run: cargo clippy --all-targets --no-default-features --locked -- -D warnings

  check-features:
    name: Feature coverage check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check python feature
        run: cargo check --features python --locked

      - name: Check python + highprec features
        run: cargo check --features "python highprec" --locked

      - name: Build wasm feature
        run: cargo build --features wasm --locked

      - name: Build wasm + parallel features
        run: cargo build --features "wasm parallel" --locked

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --tests --locked

  test-highprec:
    name: Test (highprec feature)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies for rug (GMP/MPFR)
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev libmpfr-dev

      - name: Run tests with highprec feature
        run: cargo test --tests --features highprec --locked

  test-wasm:
    name: Test (WASM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Run WASM tests
        run: wasm-pack test --node --features wasm

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run security audit
        run: cargo audit

  parity-check:
    name: Parity Check (Original RIES)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ries-rs
        uses: actions/checkout@v4

      - name: Setup C Compiler
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Download Original RIES
        run: |
          mkdir -p ries-original
          curl -O https://mrob.com/pub/ries/ries.c
          mv ries.c ries-original/ries.c

      - name: Compile Original RIES
        run: gcc ries-original/ries.c -lm -o ries-original/ries

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build ries-rs
        run: cargo build --release

      - name: Run Parity Checks
        run: |
          chmod +x tests/compare_with_original.sh
          # Test Pi
          ./tests/compare_with_original.sh 3.1415926535 2 6 ./ries-original/ries
          # Test e
          ./tests/compare_with_original.sh 2.7182818284 2 6 ./ries-original/ries
          # Test Golden Ratio
          ./tests/compare_with_original.sh 1.6180339887 2 6 ./ries-original/ries
