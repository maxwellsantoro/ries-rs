name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ries-rs-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ries-rs-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ries-rs-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ries-rs-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          strip ries-rs || true
          tar -czvf ${{ matrix.artifact }}.tar.gz ries-rs

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ${{ matrix.artifact }}.zip ries-rs.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}.*

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: npm run build:all
        env:
          CI: true

      - name: Package WASM
        run: tar -czvf ries-rs-wasm.tar.gz pkg pkg-node pkg-bundler

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ries-rs-wasm
          path: ries-rs-wasm.tar.gz

  build-python:
    name: Build Python Wheels
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --locked --features python --out dist
          target: ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.os }}
          path: dist/*.whl

  create-release:
    name: Create Release
    needs: [build-binaries, build-wasm, build-python]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*
          body: |
            ## ries-rs Release

            ### Downloads

            | Platform | File |
            |----------|------|
            | Linux x86_64 | `ries-rs-linux-x86_64.tar.gz` |
            | macOS x86_64 | `ries-rs-macos-x86_64.tar.gz` |
            | macOS ARM | `ries-rs-macos-aarch64.tar.gz` |
            | Windows | `ries-rs-windows-x86_64.exe.zip` |
            | WASM | `ries-rs-wasm.tar.gz` |
            | Python wheels | `*.whl` |

            ### Citation

            If you use this software in academic work, please cite using the BibTeX entry in the repository's CITATION.cff file.

            A DOI for this release will be available on Zenodo after the release is published.

            ### Changes

            See CHANGELOG.md for details.
